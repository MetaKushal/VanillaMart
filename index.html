<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla Mart - 10 Min Delivery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ============================================== -->
    <!-- 1. STOREFRONT VIEW                             -->
    <!-- ============================================== -->
    <div id="store-view" class="view active">
        <header class="navbar">
            <div class="logo">⚡ Vanilla Mart</div>
            <div class="search-container">
                <input type="text" id="search-bar" placeholder="Search groceries, snacks...">
            </div>
            <button id="cart-nav-btn" class="cart-btn">🛒 Cart (<span id="cart-count">0</span>)</button>
        </header>

       <div class="main-layout">
            <main class="product-area">
                
                <div class="controls-bar">
                    <h2>All Categories</h2>
                    <!-- <select id="sort-dropdown">
                        <option value="default">Sort By</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="name-a-z">Name: A to Z</option>
                    </select> -->
                </div>

                <div id="product-grid">
                    <!-- JS will inject the horizontal rows here -->
                </div>
            </main>
        </div>

        <!-- iOS Style Bottom Search Overlay -->
        <div id="mobile-search-overlay" class="hidden">
            <div id="search-results-container"></div>
            <div class="search-input-wrapper">
                <input type="text" id="mobile-search-input" placeholder="Search groceries, snacks...">
                <button id="close-search">✖</button>
            </div>
        </div>
    </div>

    <!-- ============================================== -->
    <!-- 2. CART CHECKOUT VIEW                          -->
    <!-- ============================================== -->
    <div id="cart-view" class="view hidden">
        <header class="navbar">
            <button id="back-to-store" class="back-btn">← Back to Store</button>
            <div class="logo">⚡ Vanilla Mart Checkout</div>
            <div></div> 
        </header>

        <main class="cart-container">
            <div class="cart-layout">
                
                <div class="cart-items-section">
                    <h2>Your Items</h2>
                    <div class="cart-headers">
                        <span>Item</span>
                        <span>Total</span>
                    </div>
                    <div id="cart-items-list"></div>
                </div>

                <aside class="bill-summary">
                    <h3>Bill Summary</h3>
                    <div class="math-row">
                        <span>Item Total</span>
                        <span id="subtotal">₹0.00</span>
                    </div>
                    <div class="math-row">
                        <span>Handling fee (GST 5%)</span>
                        <span id="tax">₹0.00</span>
                    </div>
                    <div class="math-row total-row">
                        <span>Total to Pay</span>
                        <span id="total">₹0.00</span>
                    </div>
                    <button id="checkout-btn" class="checkout-btn">Proceed to Pay</button>
                </aside>
                
            </div>
        </main>
    </div>

    <!-- ============================================== -->
    <!-- 3. MOBILE BOTTOM NAVIGATION                    -->
    <!-- ============================================== -->
    <nav class="bottom-nav">
        <div class="nav-item active" id="nav-home">
            <span class="nav-icon">🏠</span>
            <span>Home</span>
        </div>
        <div class="nav-item" id="nav-categories">
            <span class="nav-icon">🗂️</span>
            <span>Categories</span>
        </div>
        <div class="nav-item" id="nav-search">
            <span class="nav-icon">🔍</span>
            <span>Search</span>
        </div>
        <div class="nav-item" id="nav-cart-btn">
            <span class="nav-icon">🛒</span>
            <span>Cart (<span id="mobile-cart-count">0</span>)</span>
        </div>
    </nav>

    <script src="script.js"></script>
</body>
</html>
